name: Generate daily paper

on:
  schedule:
    # GitHub cron uses UTC. This runs at 08:20 Asia/Shanghai.
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily post
        env:
          TZ: Asia/Shanghai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python scripts/generate_daily_paper.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit generated post
        run: |
          if [ -z "$(git status --porcelain content/posts)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts
          git commit -m "Add daily paper summary"
          git push
